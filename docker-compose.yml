version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: milktix-db
    environment:
      POSTGRES_DB: milktix
      POSTGRES_USER: milktix
      POSTGRES_PASSWORD: milktix123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U milktix"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: milktix-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/milktix
      SPRING_DATASOURCE_USERNAME: milktix
      SPRING_DATASOURCE_PASSWORD: milktix123
      JWT_SECRET: ${JWT_SECRET:-your-256-bit-secret-key-for-development-only}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/data:/app/data

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: milktix-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data: