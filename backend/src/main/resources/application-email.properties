# MilkTix Email Configuration for mxroute.com
# Add these to your application.properties or set as environment variables

# Enable email service
milktix.email.enabled=true
milktix.email.from-name=MilkTix

# SMTP Configuration for mxroute.com
# Replace with your mxroute.com credentials
spring.mail.host=mxroute.com
spring.mail.port=465
spring.mail.username=${MXROUTE_USERNAME:your-username@mxroute.com}
spring.mail.password=${MXROUTE_PASSWORD:your-password}
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.starttls.enable=false

# Alternative: Use port 587 with STARTTLS
# spring.mail.port=587
# spring.mail.properties.mail.smtp.starttls.enable=true
# spring.mail.properties.mail.smtp.ssl.enable=false

# Async email configuration
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=10
