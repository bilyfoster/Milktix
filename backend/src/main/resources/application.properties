spring.application.name=MilkTix

# Server
server.port=8080

# Database (PostgreSQL)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/milktix}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:milktix}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:milktix123}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=${JWT_SECRET:your-256-bit-secret-key-for-development-only-change-in-production}
jwt.expiration=86400000

# Stripe
stripe.secret.key=${STRIPE_SECRET_KEY:sk_test_your_stripe_key}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:whsec_your_webhook_secret}

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# CORS
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000,http://207.244.251.233:3000

# Email Configuration (disabled by default - set milktix.email.enabled=true to enable)
spring.mail.host=${SMTP_HOST:localhost}
spring.mail.port=${SMTP_PORT:25}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_TLS:false}
spring.mail.properties.mail.smtp.ssl.enable=${SMTP_SSL:false}

# MilkTix Email Settings
milktix.email.enabled=${EMAIL_ENABLED:false}
milktix.email.from-name=MilkTix
milktix.email.from-address=${SMTP_FROM:noreply@milktix.com}

# Async task config for emails
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=5

# Logging
logging.level.com.milktix=DEBUG
logging.level.org.springframework.security=DEBUG